# 3 demo tenant containers + router — per-user OpenClaw isolation POC.
#
# Each openclaw-demoXX container is a full OpenClaw gateway with its own
# cron / credentials / exec-approvals / skill runtime.  First boot
# auto-generates /data/openclaw.json (see start-openclaw.sh).
#
# The router reads tenants.json at runtime and dispatches each upstream
# request by X-OpenWebUI-User-Id header.  It talks to each tenant over
# the compose-internal network using container name + port 18789.
#
# OpenWebUI itself is *not* in this compose — it runs as a separate
# container.  The top-level install.sh starts it with the right env
# vars and points its `openclaw-isolated` connection at
# http://host.docker.internal:18888/v1 (the router's exposed port).

services:
  router:
    build: ./router
    image: emt-router:latest
    container_name: emt-router
    ports:
      - "127.0.0.1:18888:18888"
    volumes:
      - ./tenants.json:/app/tenants.json:ro
    restart: unless-stopped

  openclaw-demo01:
    image: openclaw:base
    container_name: openclaw-demo01
    ports:
      - "127.0.0.1:18800:18789"
    volumes:
      - ./volumes/demo01:/data
    restart: unless-stopped

  openclaw-demo02:
    image: openclaw:base
    container_name: openclaw-demo02
    ports:
      - "127.0.0.1:18801:18789"
    volumes:
      - ./volumes/demo02:/data
    restart: unless-stopped

  openclaw-demo03:
    image: openclaw:base
    container_name: openclaw-demo03
    ports:
      - "127.0.0.1:18802:18789"
    volumes:
      - ./volumes/demo03:/data
    restart: unless-stopped
